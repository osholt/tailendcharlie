name: TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional unique iOS build number (defaults to GitHub run number)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: testflight-upload
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.44.6
  MOBILE_DIR: apps/mobile

jobs:
  upload:
    name: Build and upload iOS beta
    runs-on: macos-15
    timeout-minutes: 40
    defaults:
      run:
        working-directory: ${{ env.MOBILE_DIR }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install App Store signing materials
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CI_KEYCHAIN_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_APPSTORE_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$PROFILE_BASE64"
          certificate_path="$RUNNER_TEMP/ride-relay-distribution.p12"
          profile_path="$RUNNER_TEMP/ride-relay.mobileprovision"
          keychain_path="$RUNNER_TEMP/ride-relay.keychain-db"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
          printf '%s' "$PROFILE_BASE64" | base64 -D > "$profile_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$keychain_path" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          profile_uuid="$(security cms -D -i "$profile_path" | plutil -extract UUID raw -)"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"
      - name: Build App Store IPA
        env:
          BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}
          RIDE_RELAY_API_BASE_URL: https://ride-relay.tail7b2c49.ts.net/api
        run: |
          set -euo pipefail
          flutter pub get
          flutter build ios --release --no-codesign \
            --build-number="$BUILD_NUMBER" \
            --dart-define=RIDE_RELAY_API_BASE_URL="$RIDE_RELAY_API_BASE_URL"
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/ios/archive/Runner.xcarchive" \
            archive
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/ios/archive/Runner.xcarchive" \
            -exportPath "$PWD/build/ios/ipa" \
            -exportOptionsPlist ios/ExportOptions-TestFlight.plist
      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
          API_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$API_KEY_ID"
          test -n "$API_ISSUER_ID"
          test -n "$API_PRIVATE_KEY_BASE64"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$API_PRIVATE_KEY_BASE64" | base64 -D > "$HOME/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8"
          xcrun altool --upload-package build/ios/ipa/ride_relay.ipa \
            --api-key "$API_KEY_ID" \
            --api-issuer "$API_ISSUER_ID"
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ride-relay-ios-app-store-ipa
          path: ${{ env.MOBILE_DIR }}/build/ios/ipa/*.ipa
          if-no-files-found: ignore
