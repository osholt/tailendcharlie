name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - apps/website/**
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tail-end-charlie-website
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy tailendcharlie.app
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Confirm deployment credentials are configured
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
      - name: Deploy Cloudflare Pages site
        run: |
          npx --yes wrangler@4.112.0 pages deploy apps/website \
            --project-name tail-end-charlie \
            --branch main
