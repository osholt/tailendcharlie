name: ride-relay-preproduction

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ride_relay
      POSTGRES_USER: ride_relay
      POSTGRES_PASSWORD: ${PREPRODUCTION_POSTGRES_PASSWORD:?set PREPRODUCTION_POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U ride_relay -d ride_relay]
      interval: 5s
      timeout: 5s
      retries: 12

  # Keep this service name distinct from production's `server`. Docker adds
  # the Compose service name as a DNS alias on every attached network; using
  # `server` here would make the production proxy randomly resolve either API.
  preproduction-server:
    build:
      context: ../apps/server
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    environment: &server-environment
      RIDE_RELAY_ENVIRONMENT: preproduction
      RIDE_RELAY_DATABASE_URL: postgresql+psycopg://ride_relay:${PREPRODUCTION_POSTGRES_PASSWORD}@db:5432/ride_relay
      RIDE_RELAY_DATA_ENCRYPTION_KEY: ${PREPRODUCTION_RIDE_RELAY_DATA_ENCRYPTION_KEY:?set PREPRODUCTION_RIDE_RELAY_DATA_ENCRYPTION_KEY}
      RIDE_RELAY_CURSOR_SIGNING_KEY: ${PREPRODUCTION_RIDE_RELAY_CURSOR_SIGNING_KEY:?set PREPRODUCTION_RIDE_RELAY_CURSOR_SIGNING_KEY}
      RIDE_RELAY_APNS_TEAM_ID: ${PREPRODUCTION_RIDE_RELAY_APNS_TEAM_ID:-}
      RIDE_RELAY_APNS_KEY_ID: ${PREPRODUCTION_RIDE_RELAY_APNS_KEY_ID:-}
      RIDE_RELAY_APNS_BUNDLE_ID: ${PREPRODUCTION_RIDE_RELAY_APNS_BUNDLE_ID:-}
      RIDE_RELAY_APNS_PRIVATE_KEY_BASE64: ${PREPRODUCTION_RIDE_RELAY_APNS_PRIVATE_KEY_BASE64:-}
      RIDE_RELAY_APNS_SANDBOX: ${PREPRODUCTION_RIDE_RELAY_APNS_SANDBOX:-true}
      RIDE_RELAY_FCM_PROJECT_ID: ${PREPRODUCTION_RIDE_RELAY_FCM_PROJECT_ID:-}
      RIDE_RELAY_FCM_CLIENT_EMAIL: ${PREPRODUCTION_RIDE_RELAY_FCM_CLIENT_EMAIL:-}
      RIDE_RELAY_FCM_PRIVATE_KEY_BASE64: ${PREPRODUCTION_RIDE_RELAY_FCM_PRIVATE_KEY_BASE64:-}
      RIDE_RELAY_PUSH_DELIVERY_TIMEOUT_SECONDS: ${PREPRODUCTION_RIDE_RELAY_PUSH_DELIVERY_TIMEOUT_SECONDS:-8}
      RIDE_RELAY_DISCOVERY_ADMIN_TOKEN: ${PREPRODUCTION_RIDE_RELAY_DISCOVERY_ADMIN_TOKEN:-}
      RIDE_RELAY_DISCOVERY_ADMIN_NAME: ${PREPRODUCTION_RIDE_RELAY_DISCOVERY_ADMIN_NAME:-preproduction-discovery-admin}
      RIDE_RELAY_DISCOVERY_ALLOWED_ORIGINS: '["https://tailendcharlie.app","https://www.tailendcharlie.app"]'
      RIDE_RELAY_TRUSTED_HOSTS: '["${RIDE_RELAY_PREPRODUCTION_DOMAIN}","127.0.0.1","localhost"]'
      RIDE_RELAY_FORWARDED_ALLOW_IPS: '*'
      RIDE_RELAY_AUTO_CREATE_SCHEMA: 'false'
      RIDE_RELAY_RIDE_RETENTION_HOURS: 72
      RIDE_RELAY_ENDED_RIDE_GRACE_HOURS: 24
      RIDE_RELAY_JOIN_CODE_LOOKUP_RATE_LIMIT_REQUESTS: 30
      RIDE_RELAY_JOIN_CODE_LOOKUP_RATE_LIMIT_WINDOW_SECONDS: 60
      RIDE_RELAY_JOIN_CODE_GLOBAL_RATE_LIMIT_REQUESTS: 20
      RIDE_RELAY_MAXIMUM_ACTIVE_RIDES: ${PREPRODUCTION_RIDE_RELAY_MAXIMUM_ACTIVE_RIDES:-25}
      RIDE_RELAY_MAXIMUM_EVENTS_PER_RIDE: ${PREPRODUCTION_RIDE_RELAY_MAXIMUM_EVENTS_PER_RIDE:-2500}
      RIDE_RELAY_MAXIMUM_STORED_BYTES_PER_RIDE: ${PREPRODUCTION_RIDE_RELAY_MAXIMUM_STORED_BYTES_PER_RIDE:-13107200}
      RIDE_RELAY_MAXIMUM_REPLAYS_PER_RIDE: ${PREPRODUCTION_RIDE_RELAY_MAXIMUM_REPLAYS_PER_RIDE:-2500}
      RIDE_RELAY_MAXIMUM_REPLAY_BYTES_PER_RIDE: ${PREPRODUCTION_RIDE_RELAY_MAXIMUM_REPLAY_BYTES_PER_RIDE:-13107200}
      RIDE_RELAY_OBSERVER_READ_RATE_LIMIT_REQUESTS: ${PREPRODUCTION_RIDE_RELAY_OBSERVER_READ_RATE_LIMIT_REQUESTS:-120}
      RIDE_RELAY_OBSERVER_READ_RATE_LIMIT_WINDOW_SECONDS: ${PREPRODUCTION_RIDE_RELAY_OBSERVER_READ_RATE_LIMIT_WINDOW_SECONDS:-60}
      RIDE_RELAY_OBSERVER_IP_ABUSE_RATE_LIMIT_REQUESTS: ${PREPRODUCTION_RIDE_RELAY_OBSERVER_IP_ABUSE_RATE_LIMIT_REQUESTS:-5000}
      RIDE_RELAY_OBSERVER_CREATE_RATE_LIMIT_REQUESTS: ${PREPRODUCTION_RIDE_RELAY_OBSERVER_CREATE_RATE_LIMIT_REQUESTS:-10}
      RIDE_RELAY_OBSERVER_CREATE_IP_ABUSE_RATE_LIMIT_REQUESTS: ${PREPRODUCTION_RIDE_RELAY_OBSERVER_CREATE_IP_ABUSE_RATE_LIMIT_REQUESTS:-500}
      RIDE_RELAY_OBSERVER_CREATE_RATE_LIMIT_WINDOW_SECONDS: ${PREPRODUCTION_RIDE_RELAY_OBSERVER_CREATE_RATE_LIMIT_WINDOW_SECONDS:-3600}
      RIDE_RELAY_MAXIMUM_OBSERVER_GRANTS_PER_RIDE: ${PREPRODUCTION_RIDE_RELAY_MAXIMUM_OBSERVER_GRANTS_PER_RIDE:-50}
    networks:
      default:
      relay-proxy:
        aliases:
          - preproduction-server
    depends_on:
      db:
        condition: service_healthy

  cleanup:
    build:
      context: ../apps/server
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    environment: *server-environment
    command:
      - sh
      - -c
      - while true; do .venv/bin/ride-relay-cleanup; sleep 3600; done
    healthcheck:
      disable: true
    depends_on:
      preproduction-server:
        condition: service_healthy

networks:
  relay-proxy:
    name: ride-relay_default
    external: true

volumes:
  postgres-data:
